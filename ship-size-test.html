  var x = +part.x||20, y = +part.y||20, w = +part.w||8, ph = +part.h||8;
  var rot = part.rot||0, color = part.color||"#80ddff";
  var op = typeof part.opacity==="number" ? part.opacity : 1;
  var bw = +part.bw||0, bc = part.bc||"#000", bo = typeof part.bo==="number"?part.bo:1;
  var cr = +part.cr||0;
  var t = "rotate("+rot+" "+x+" "+y+")";
  var sp = bw>0 ? { stroke:bc, strokeWidth:bw, strokeOpacity:bo } : {};
  var fm = part.fillMode||"solid", c2 = part.color2||color;
  var ga = +part.gradAngle||0, gs = +part.gradStop||0;
  var fill = color, defs = null;
  if (fm==="linear"||fm==="radial") {
    var gid = "g"+key;
    var stops = [h("stop",{key:"s0",offset:"0%",stopColor:color})];
    if (fm==="radial"&&gs>0) stops.push(h("stop",{key:"sm",offset:(gs*100)+"%",stopColor:color}));
    stops.push(h("stop",{key:"s1",offset:"100%",stopColor:c2}));
    defs = fm==="linear"
      ? h("defs",{key:"d"},h("linearGradient",{id:gid,x1:"0",y1:"0",x2:"1",y2:"0",gradientTransform:"rotate("+ga+" 0.5 0.5)"},stops))
      : h("defs",{key:"d"},h("radialGradient",{id:gid,cx:"0.5",cy:"0.5",r:"0.5"},stops));
    fill = "url(#"+gid+")";
  }
  var inner;
  if (part.type==="circle") {
    inner = h("ellipse",Object.assign({cx:x,cy:y,rx:w/2,ry:ph/2,fill:fill,fillOpacity:op,transform:t},sp));
  } else if (part.type==="rect") {
    inner = h("rect",Object.assign({x:x-w/2,y:y-ph/2,width:w,height:ph,rx:cr,ry:cr,fill:fill,fillOpacity:op,transform:t},sp));
  } else if (part.type==="triangle") {
    var pts = (x)+","+(y-ph/2)+" "+(x-w/2)+","+(y+ph/2)+" "+(x+w/2)+","+(y+ph/2);
    inner = h("polygon",Object.assign({points:pts,fill:fill,fillOpacity:op,transform:t},sp));
  } else if (part.type==="line") {
    inner = h("rect",Object.assign({x:x-w/2,y:y-Math.max(0.4,ph)/2,width:w,height:Math.max(0.4,ph),fill:fill,fillOpacity:op,transform:t},sp));
  } else if (part.type==="trapezoid") {
    var tw=+part.tw||(w*0.5), tofs=+part.tofs||0;
    var pts2=(x-tw/2+tofs)+","+(y-ph/2)+" "+(x+tw/2+tofs)+","+(y-ph/2)+" "+(x+w/2)+","+(y+ph/2)+" "+(x-w/2)+","+(y+ph/2);
    inner = h("polygon",Object.assign({points:pts2,fill:fill,fillOpacity:op,transform:t},sp));
  } else if (part.type==="arrow") {
    var apts = ARROW_POINTS.map(function(p){return (x+p[0]*w)+","+(y+p[1]*ph);}).join(" ");
    inner = h("polygon",Object.assign({points:apts,fill:fill,fillOpacity:op,transform:t},sp));
  } else { return null; }
  return h("g",{key:key},defs,inner);
}

function ShipSvg(props) {
  var sz = props.size||40;
  var parts = (props.design&&props.design.parts)||[];
  return h("svg",{viewBox:"0 0 40 40",width:sz,height:sz,style:Object.assign({display:"block"},props.style||{})},
    h("g",null, parts.map(function(p,i){return shipRenderPart(p,(props.uid||"s")+"-"+i);})));
}

// ── Block component ─────────────────────────────────────────────────────────
function Block(props) {
  var s = props.size, c = BLOCK_COLORS[props.type];
  if (!c) return h("div",{style:{width:s,height:s}});
  var cr = Math.max(3,Math.round(s*0.12));
  return h("div",{style:{
    width:s,height:s,borderRadius:cr,flexShrink:0,
    background:"linear-gradient(170deg,"+c.hi+" 0%,"+c.bg+" 100%)",
    border:"1px solid "+c.hi+"88",
    boxShadow:"0 0 8px "+c.glow+", inset 0 1px 0 rgba(255,255,255,0.18)",
    position:"relative",overflow:"hidden"
  }},
  h("div",{style:{position:"absolute",top:2,left:2,right:2,height:Math.max(2,Math.round(s*0.14)),borderRadius:cr,background:"rgba(255,255,255,0.18)"}}));
}

// ── Stars ───────────────────────────────────────────────────────────────────
var STARS = (function(){
  var s=[]; for(var i=0;i<40;i++) s.push({x:Math.random()*100,y:Math.random()*100,r:(Math.random()*1.2+0.3).toFixed(1),o:(Math.random()*0.5+0.2).toFixed(2)});
  return s;
})();

// ── Main App ────────────────────────────────────────────────────────────────
function MockApp() {
  var _sz = useState(ORIG_SIZE); var shipSize = _sz[0]; var setShipSize = _sz[1];
  var _hi = useState(0);         var hullIdx  = _hi[0]; var setHullIdx  = _hi[1];
  var _sc = useState(3);         var shipCol  = _sc[0]; var setShipCol  = _sc[1];
  var _bw = useState(0);         var bw       = _bw[0]; var setBw       = _bw[1];
  var boardRef = useRef(null);

  useEffect(function(){
    function meas(){ if(boardRef.current) setBw(boardRef.current.offsetWidth); }
    meas();
    window.addEventListener("resize",meas);
    return function(){window.removeEventListener("resize",meas);};
  },[]);

  var blockSize = bw>0 ? (bw - GAP*(COLS-1)) / COLS : 38;
  var pct = Math.round((shipSize / ROW_H) * 100);
  var origPct = Math.round((ORIG_SIZE / ROW_H) * 100);
  var hullId = SHIP_HULLS[hullIdx];
  var design = { parts: HULL_PRESETS[hullId]||[] };

  // Brushed metal style for dashboard
  var brushed = "repeating-linear-gradient(90deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 4px),linear-gradient(180deg,#2a3040 0%,#1e2530 100%)";

  return h("div",{style:{display:"flex",flexDirection:"column",height:"100%",background:"#0a0c14",overflow:"visible"}},

    // ── Header ──
    h("div",{style:{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"rgba(0,0,0,0.4)",borderBottom:"1px solid rgba(80,120,160,0.15)"}},
      h("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:"rgba(180,200,220,0.5)",fontFamily:"'Exo 2',sans-serif",textTransform:"uppercase"}},"Cosmic Drift"),
      h("div",{style:{display:"flex",gap:16,alignItems:"center"}},
        h("div",{style:{display:"flex",gap:4,alignItems:"center"}},
          h("div",{style:{width:8,height:8,borderRadius:"50%",background:"#80ddff",boxShadow:"0 0 6px #80ddff"}}),
          h("div",{style:{fontSize:12,color:"rgba(180,200,220,0.6)",fontWeight:700}},"1,420")),
        h("div",{style:{display:"flex",gap:2}},
          [1,2,3].map(function(i){return h("div",{key:i,style:{width:14,height:14,borderRadius:2,background:"#ff8aaa",boxShadow:"0 0 4px rgba(255,138,170,0.5)"}});})))),

    // ── Game board ──
    h("div",{ref:boardRef,style:{flexShrink:0,position:"relative",padding:"0",overflow:"visible",background:"linear-gradient(180deg,#0a0c14 0%,#0c1020 100%)"}},

      // Starfield
      h("svg",{style:{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"},viewBox:"0 0 100 100",preserveAspectRatio:"none"},
        STARS.map(function(s,i){return h("circle",{key:i,cx:s.x,cy:s.y,r:s.r,fill:"white",fillOpacity:s.o});})),

      // Grid (blocks)
      h("div",{style:{padding:"8px 0 0",position:"relative",zIndex:1}},
        GRID.map(function(row,ri){
          return h("div",{key:ri,style:{display:"grid",gridTemplateColumns:"repeat("+COLS+","+blockSize+"px)",gap:GAP+"px",marginBottom:GAP+"px"}},
            row.map(function(cell,ci){
              return h("div",{key:ci,style:{width:blockSize,height:blockSize}},
                cell ? h(Block,{type:cell,size:blockSize}) : null);
            }));
        })),

      // Ship zone
      h("div",{style:{position:"relative",zIndex:2,overflow:"visible"}},
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat("+COLS+","+blockSize+"px)",gap:GAP+"px",overflow:"visible"}},
          (new Array(COLS)).fill(0).map(function(_,ci){
            var isActive = ci===shipCol;
            return h("div",{key:ci,
              onClick:function(){setShipCol(ci);},
              style:{position:"relative",height:ROW_H,overflow:"visible",cursor:"pointer",
                borderTop:"2px solid rgba(140,160,180,"+(isActive?"0.2":"0.06")+")",
                background:isActive?"rgba(255,168,255,0.04)":"transparent"}},
              isActive && h(ShipSvg,{size:shipSize,design:design,uid:"game",
                style:{
                  position:"absolute",
                  bottom:2,
                  left:"50%",
                  transform:"translateX(-50%)",
                  filter:"drop-shadow(0 0 "+(shipSize*0.15)+"px rgba(255,168,255,0.55))"
                }})
            );
          })))),

    // ── Dashboard strip ──
    h("div",{style:{flexShrink:0,background:brushed,backgroundBlendMode:"overlay",borderTop:"3px solid #404a58",padding:"5px 10px",display:"flex",gap:12,alignItems:"center",boxShadow:"0 -4px 12px rgba(0,0,0,0.55), inset 0 1px 0 rgba(200,230,240,0.06)"}},
      h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
        h("div",{style:{width:8,height:8,borderRadius:1,background:"#ff8aaa",boxShadow:"0 0 6px #ff8aaa"}}),
        h("div",{style:{fontSize:10,color:"rgba(180,200,220,0.45)",letterSpacing:1,fontFamily:"'Exo 2',sans-serif",textTransform:"uppercase"}},"Shield")),
      h("div",{style:{flex:1,height:5,borderRadius:3,background:"rgba(255,255,255,0.08)",overflow:"hidden"}},
        h("div",{style:{width:"72%",height:"100%",background:"linear-gradient(90deg,#2266ff,#44aaff)",borderRadius:3}})),
      h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
        h("div",{style:{width:8,height:8,borderRadius:1,background:"#ffd060",boxShadow:"0 0 6px #ffd060"}}),
        h("div",{style:{fontSize:10,color:"rgba(180,200,220,0.45)",letterSpacing:1,fontFamily:"'Exo 2',sans-serif",textTransform:"uppercase"}},"Power")),
      h("div",{style:{flex:1,height:5,borderRadius:3,background:"rgba(255,255,255,0.08)",overflow:"hidden"}},
        h("div",{style:{width:"48%",height:"100%",background:"linear-gradient(90deg,#ff8800,#ffdd44)",borderRadius:3}}))),

    // ── Control Panel ──
    h("div",{style:{flex:1,overflowY:"auto",background:"linear-gradient(180deg,#0e1220 0%,#0a0c14 100%)",borderTop:"1px solid rgba(80,120,160,0.2)",padding:"12px 14px 16px"}},

      // Hull picker label
      h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:1.5,color:"rgba(180,200,220,0.4)",textTransform:"uppercase",fontFamily:"'Exo 2',sans-serif",marginBottom:8}},"Hull Template"),

      // Hull thumbnails
      h("div",{style:{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:14}},
        SHIP_HULLS.map(function(hull,idx){
          var on = idx===hullIdx;
          var d = {parts:HULL_PRESETS[hull]||[]};
          return h("div",{key:hull,onClick:function(){setHullIdx(idx);},
            style:{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"6px 6px 4px",borderRadius:8,cursor:"pointer",
              background:on?"rgba(255,138,170,0.15)":"rgba(255,255,255,0.04)",
              border:on?"1px solid rgba(255,138,170,0.55)":"1px solid rgba(255,255,255,0.08)"}},
            h(ShipSvg,{size:38,design:d,uid:"th"+idx}),
            h("div",{style:{fontSize:8,fontWeight:700,letterSpacing:0.5,textAlign:"center",color:on?"#ff8aaa":"rgba(180,200,220,0.45)",fontFamily:"'Exo 2',sans-serif",textTransform:"uppercase",whiteSpace:"nowrap",maxWidth:46,overflow:"hidden",textOverflow:"ellipsis"}},
              SHIP_HULL_LABELS[hull]));
        })),

      // Divider
      h("div",{style:{height:1,background:"rgba(80,120,160,0.15)",marginBottom:14}}),

      // Size label
      h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:1.5,color:"rgba(180,200,220,0.4)",textTransform:"uppercase",fontFamily:"'Exo 2',sans-serif",marginBottom:10}},"Ship Size"),

      // Big readout
      h("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"center",gap:10,marginBottom:10}},
        h("div",{style:{fontSize:52,fontWeight:700,lineHeight:1,color:"#ff8aaa",fontFamily:"'Exo 2',sans-serif",letterSpacing:-1,textShadow:"0 0 24px rgba(255,138,170,0.4)"}},pct+"%"),
        h("div",{style:{display:"flex",flexDirection:"column",gap:2}},
          h("div",{style:{fontSize:16,fontWeight:700,color:"rgba(180,200,220,0.7)",fontFamily:"'Exo 2',sans-serif"}},shipSize+"px"),
          h("div",{style:{fontSize:10,color:"rgba(180,200,220,0.35)",letterSpacing:0.5}},
            "row: "+ROW_H+"px"))),

      // Size slider
      h("div",{style:{position:"relative",marginBottom:6}},
        h("input",{type:"range",min:20,max:340,step:1,value:shipSize,
          onChange:function(e){setShipSize(+e.target.value);},
          style:{width:"100%"}}),
        // Tick marks at 100% intervals
        h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:4,padding:"0 2px"}},
          [0,100,200,300,400,500].map(function(p){
            var px = Math.round(p/100*ROW_H); if(px<20) px=20;
            return h("div",{key:p,style:{textAlign:"center"}},
              h("div",{style:{width:1,height:4,background:"rgba(255,255,255,0.2)",margin:"0 auto"}}),
              h("div",{style:{fontSize:9,color:p===100?"rgba(255,138,170,0.6)":"rgba(180,200,220,0.3)",marginTop:1}},p+"%"));
          }))),

      // Reference line
      h("div",{style:{display:"flex",justifyContent:"center",gap:16,marginTop:2,marginBottom:14}},
        h("div",{style:{display:"flex",alignItems:"center",gap:5}},
          h("div",{style:{width:10,height:2,background:"rgba(180,200,220,0.3)",borderRadius:1}}),
          h("div",{style:{fontSize:10,color:"rgba(180,200,220,0.35)"}},"Original: "+origPct+"% ("+ORIG_SIZE+"px)")),
        h("div",{style:{display:"flex",alignItems:"center",gap:5}},
          h("div",{style:{width:10,height:2,background:"rgba(255,138,170,0.4)",borderRadius:1}}),
          h("div",{style:{fontSize:10,color:"rgba(180,200,220,0.35)"}},"Row = "+ROW_H+"px"))),

    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(MockApp));
</script>
