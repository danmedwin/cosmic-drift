// Storage shim: wraps localStorage with cd_ prefix
window.storage = {
  get: function(key) {
    try { var val = localStorage.getItem("cd_" + key);
      return Promise.resolve(val != null ? { key: key, value: val } : null);
    } catch(e) { return Promise.resolve(null); }
  },
  set: function(key, value) {
    try { localStorage.setItem("cd_" + key, value);
      return Promise.resolve({ key: key, value: value });
    } catch(e) { return Promise.resolve(null); }
  },
  delete: function(key) {
    try { localStorage.removeItem("cd_" + key);
      return Promise.resolve({ key: key, deleted: true });
    } catch(e) { return Promise.resolve(null); }
  },
  list: function(prefix) {
    try { var keys = []; var pfx = "cd_" + (prefix || "");
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k.indexOf(pfx) === 0) keys.push(k.substring(3));
      }
      return Promise.resolve({ keys: keys });
    } catch(e) { return Promise.resolve({ keys: [] }); }
  }
};

// Hosted detection matches cosmicdriftapp.com (and localhost); the Claude
// artifact sandbox has no real origin, so there we just inform the user.
function navigateToGame(levelId) {
  var url = "index.html";
  if (levelId != null) url = url + "?play=" + encodeURIComponent(levelId);
  try {
    var h = window.location.hostname;
    if (h === "localhost" || h === "127.0.0.1" || h.indexOf("cosmicdriftapp.com") >= 0) {
      window.location.href = url;
    } else {
      alert("Play is available at your hosted site: cosmicdriftapp.com");
    }
  } catch (e) {
    alert("Play is available at your hosted site: cosmicdriftapp.com");
  }
}
