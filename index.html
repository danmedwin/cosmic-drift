// Storage shim: wraps localStorage with cd_ prefix
window.storage = {
  get: function(key) {
    try { var val = localStorage.getItem("cd_" + key);
      return Promise.resolve(val != null ? { key: key, value: val } : null);
    } catch(e) { return Promise.resolve(null); }
  },
  set: function(key, value) {
    try { localStorage.setItem("cd_" + key, value);
      return Promise.resolve({ key: key, value: value });
    } catch(e) { return Promise.resolve(null); }
  },
  delete: function(key) {
    try { localStorage.removeItem("cd_" + key);
      return Promise.resolve({ key: key, deleted: true });
    } catch(e) { return Promise.resolve(null); }
  },
  list: function(prefix) {
    try { var keys = []; var pfx = "cd_" + (prefix || "");
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k.indexOf(pfx) === 0) keys.push(k.substring(3));
      }
      return Promise.resolve({ keys: keys });
    } catch(e) { return Promise.resolve({ keys: [] }); }
  }
};

function generateTutorialGrid(lvl) {
  var grid = new Array(COLS * ROWS).fill(0);
  if (lvl === 1) {
    grid[2 * COLS + 3] = 1; // directly above ship start
    grid[1 * COLS + 1] = 1; // left side for drag practice
    grid[1 * COLS + 6] = 1; // right side for warp practice
    grid[3 * COLS + 5] = 1; // for insta-shoot practice
  } else if (lvl === 2) {
    grid[3 * COLS + 3] = 2; // cross shot above ship
    grid[3 * COLS + 0] = 1; // regular left (3 cols away)
    grid[3 * COLS + 7] = 1; // regular right (4 cols away)
    grid[0 * COLS + 3] = 1; // regular above (3 rows up)
  } else if (lvl === 3) {
    grid[3 * COLS + 2] = 2; // cross shot - ship fires here
    grid[3 * COLS + 0] = 13; // cross shot crate (reached by cross shot left)
    grid[4 * COLS + 0] = 7; // indestructible below crate (blocks direct fire)
    grid[4 * COLS + 5] = 7; // indestructible under plus (blocks direct fire)
    grid[4 * COLS + 6] = 7; // indestructible under plus (blocks direct fire)
    grid[4 * COLS + 7] = 7; // indestructible under plus (blocks direct fire)
    grid[0 * COLS + 6] = 1; // plus: top
    grid[1 * COLS + 5] = 1; // plus: left
    grid[1 * COLS + 6] = 1; // plus: center (target for deployed cross-shot)
    grid[1 * COLS + 7] = 1; // plus: right
    grid[2 * COLS + 6] = 1; // plus: bottom
  }
  return grid;
}
function getTutorialShipStart(lvl) {
  if (lvl === 3) return 0;
  return 3;
}
function getTutorialText(lvl, phase, reminder) {
  if (lvl === 1) {
    if (phase === 0) return "Tap your ship to shoot plasma";
    if (phase === 1) return "Drag your ship under a block, then tap to fire";
    if (phase === 2) return "Tap a spot in the ship row to warp there";
    if (phase === 3) return reminder ? "Now tap your ship to fire!" : null;
    if (phase === 4) return "Insta-shoot: tap a block or column to move and fire in one step";
  }
  if (lvl === 2) {
    if (phase === 0) return "Special blocks activate power-ups";
  }
  if (lvl === 3) {
    if (phase === 0) return "Some blocks are indestructible. Find another way around them.";
    if (phase === 1) return "Tap the power-up in your inventory to arm it";
    if (phase === 2) return "Tap any block to deploy";
  }
  if (lvl === 4) {
    if (phase === 0) return "You only have one plasma. Shoot the Plasma Cell to get more.";
    if (phase === 1) return "Great! Now aim for the blocks in the tower.";
    if (phase === 2) return "You ran out of plasma. Tap the plasma panel to recharge from a reactor core.";
    if (phase === 3) return "Shoot the Reactor Core block to earn an extra core.";
  }
  if (lvl === 5) {
    if (phase === 0) return "Shoot the Lightning Block. It zaps every block above it.";
    if (phase === 1) return "You got a Lightning power-up! Tap it below to arm, then shoot it at the 2nd tower.";
  }
  if (lvl === 6) {
    if (phase === 0) return "Shoot the Drone Block. It targets the densest 3x3 cluster.";
    if (phase === 1) return "Drone power-up! Tap it below, then deploy on the remaining cluster.";
  }
  if (lvl === 7) {
    if (phase === 0) return "Shoot the Cross Shot to break the Acid Barrel. Careful, ooze drains plasma!";
    if (phase === 1) return "Now shoot the other Cross Shot. Ooze is blocked by indestructible blocks.";
  }
  if (lvl === 8) {
    if (phase === 0) return "A Force Field block takes 3 hits to destroy.";
    if (phase === 1) return "It spawns two regular blocks and a surprise!";
  }
  if (lvl === 9) {
    if (phase === 1) return "You got the Splitter power-up. Tap below to arm.";
    if (phase === 2) return "The dotted lines and target show the path. Aim carefully.";
    if (phase === 3) return "Tap below to arm the Hammer and select one block to destroy.";
  }
  return null;
}

}
